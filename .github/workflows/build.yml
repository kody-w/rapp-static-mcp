name: build-static-mcps
on:
  push:
    branches: [main]
    paths: ['examples/**/manifest.json', 'examples/**/cells/**', 'build.mjs']
  workflow_dispatch:
permissions: { contents: write }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Rebuild every example catalog
        run: |
          for d in examples/*/ ; do [ -f "$d/manifest.json" ] && node build.mjs "$d" ; done
      - name: Commit if changed
        run: |
          git config user.name "static-mcp-bot"
          git config user.email "static-mcp-bot@users.noreply.github.com"
          git add examples/**/tools.json examples/**/registry.json examples/**/llms.txt examples/**/cells/versions || true
          git diff --cached --quiet || { git commit -m "chore: rebuild static MCP catalogs [skip ci]"; git push; }
